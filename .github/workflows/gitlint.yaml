name: Flake bump check commits
on:
  pull_request:
    paths:
      - 'flake.lock'
    branches:
      - main

jobs:
  gitlint:
    name: Check flake bump requirements
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade gitlint
    - name: Lint git commit messages
      run: |
        gitlint --commits origin/$GITHUB_BASE_REF.. -C .gitlint_auto_approve

  gitmerge:
    name: Merge flake bump
    runs-on: ubuntu-latest
    steps:
    - name: Generate token
      id: generate_token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.GH_AUTO_APPROVE_APP_ID }}
        private-key: ${{ secrets.GH_AUTO_APPROVE_APP_PRIVATE_KEY }}
        owner: daedalus-ca
        repositories: test-auto-approve
    - name: Get App User ID
      id: get_user_id
      uses: octokit/request-action@v2.x
      with:
        route: "/users/${{ steps.generate_token.outputs.app-slug }}[bot]"
      env:
        GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
    - name: Setup Git
      shell: bash
      run: |
        git config --global --add safe.directory $PWD
        git config --global user.name '${{ steps.generate_token.outputs.app-slug }}[bot]'
        git config --global user.email '${{ fromJson(steps.get_user_id.outputs.data).id }}+${{ steps.generate_token.outputs.app-slug }}[bot]@users.noreply.github.com'
        git config --global push.autoSetupRemote true
    - name: Merge Pull request
      shell: bash
      run: |
        # GitHub CLI api
        # https://cli.github.com/manual/gh_api
        gh api \
          --method PUT \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          /repos/daedalus-ca/test-auto-approve/pulls/${{ github.event.number }}/merge \
          -f 'merge_method=rebase'
